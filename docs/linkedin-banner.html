<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1584" />
    <title>LinkedIn Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 1584px;
        height: 396px;
        overflow: hidden;
        font-family: "DM Sans", system-ui, sans-serif;
        background-color: oklch(0.208 0.042 264.695);
        color: oklch(0.984 0.003 247.858);
        position: relative;
      }

      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        pointer-events: none;
      }
      .blob-1 {
        width: 600px;
        height: 600px;
        background: oklch(54% 0.245 262.881);
        top: -260px;
        right: -80px;
        opacity: 0.22;
      }
      .blob-2 {
        width: 350px;
        height: 350px;
        background: oklch(54% 0.245 262.881);
        bottom: -180px;
        left: 80px;
        opacity: 0.1;
      }
      .blob-3 {
        width: 300px;
        height: 300px;
        background: oklch(68% 0.169 237.323);
        top: -80px;
        left: 600px;
        opacity: 0.09;
      }

      .grid-overlay {
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          -45deg,
          oklch(0.372 0.044 257.287 / 0.18) 0px,
          oklch(0.372 0.044 257.287 / 0.18) 1px,
          transparent 1px,
          transparent 24px
        );
      }

      .content {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        height: 100%;
        padding-right: 160px;
      }

      /* Bloc centre : accroche */
      .col-tagline {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      h2 {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-weight: 800;
        font-size: 56px;
        line-height: 1.1;
        letter-spacing: -0.02em;
        color: oklch(0.984 0.003 247.858);
      }

      .gradient-text {
        background: linear-gradient(
          135deg,
          oklch(54% 0.245 262.881) 0%,
          oklch(68% 0.169 237.323) 50%,
          oklch(54% 0.245 262.881) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: oklch(0.26 0.06 149 / 0.2);
        border: 1px solid oklch(62% 0.194 149.214 / 0.5);
        border-radius: 100px;
        padding: 6px 16px;
        font-size: 13px;
        font-weight: 600;
        color: oklch(72% 0.194 149.214);
        width: fit-content;
      }
      .badge-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: oklch(62% 0.194 149.214);
        box-shadow: 0 0 6px oklch(62% 0.194 149.214 / 0.8);
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>

    <div class="content">
      <!-- Accroche -->
      <div class="col-tagline">
        <h2>
          Applications<br />
          <span class="gradient-text">pensées pour durer.</span>
        </h2>
        <div class="badge">
          <span class="badge-dot"></span>
          Disponible — CDI · Mission · Freelance
        </div>
      </div>
    </div>
  </body>
</html>
