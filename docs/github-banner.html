<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280" />
    <title>GitHub Banner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 1280px;
        height: 640px;
        overflow: hidden;
        font-family: "DM Sans", system-ui, sans-serif;
        background-color: oklch(0.208 0.042 264.695);
        color: oklch(0.984 0.003 247.858);
        position: relative;
      }

      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        pointer-events: none;
      }
      .blob-1 {
        width: 560px;
        height: 560px;
        background: oklch(54% 0.245 262.881);
        top: -160px;
        right: -100px;
        opacity: 0.2;
      }
      .blob-2 {
        width: 400px;
        height: 400px;
        background: oklch(54% 0.245 262.881);
        bottom: -120px;
        left: 40px;
        opacity: 0.1;
      }
      .blob-3 {
        width: 280px;
        height: 280px;
        background: oklch(68% 0.169 237.323);
        top: 80px;
        left: 380px;
        opacity: 0.09;
      }

      .grid-overlay {
        position: absolute;
        inset: 0;
        background-image: repeating-linear-gradient(
          -45deg,
          oklch(0.372 0.044 257.287 / 0.18) 0px,
          oklch(0.372 0.044 257.287 / 0.18) 1px,
          transparent 1px,
          transparent 24px
        );
      }

      .content {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 100%;
        padding: 60px 88px;
        gap: 60px;
      }

      /* Colonne texte */
      .col-text {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: oklch(0.26 0.06 149 / 0.2);
        border: 1px solid oklch(62% 0.194 149.214 / 0.5);
        border-radius: 100px;
        padding: 8px 18px;
        font-size: 14px;
        font-weight: 600;
        color: oklch(72% 0.194 149.214);
        width: fit-content;
        margin-bottom: 28px;
      }
      .badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: oklch(62% 0.194 149.214);
        box-shadow: 0 0 8px oklch(62% 0.194 149.214 / 0.8);
        flex-shrink: 0;
      }

      h1 {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        font-weight: 800;
        font-size: 58px;
        line-height: 1.08;
        letter-spacing: -0.025em;
        color: oklch(0.984 0.003 247.858);
        margin-bottom: 28px;
      }

      .gradient-text {
        background: linear-gradient(
          135deg,
          oklch(54% 0.245 262.881) 0%,
          oklch(68% 0.169 237.323) 50%,
          oklch(54% 0.245 262.881) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        font-size: 15px;
        font-weight: 500;
        color: oklch(0.704 0.04 256.788);
        letter-spacing: 0.01em;
        margin-bottom: 16px;
      }

      /* Tags techno — pertinents pour un profil GitHub */
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tag {
        display: inline-flex;
        align-items: center;
        background: oklch(0.279 0.041 260.031);
        border: 1px solid oklch(0.372 0.044 257.287);
        border-radius: 6px;
        padding: 5px 12px;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 12px;
        font-weight: 500;
        color: oklch(0.704 0.04 256.788);
      }

      /* Colonne photo */
      .col-photo {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .photo-wrapper {
        width: 300px;
        height: 300px;
        border-radius: 50%;
        overflow: hidden;
        background: oklch(54% 0.245 262.881);
        box-shadow:
          0 0 80px oklch(54% 0.245 262.881 / 0.4),
          0 0 160px oklch(54% 0.245 262.881 / 0.18);
        border: 2px solid oklch(54% 0.245 262.881 / 0.3);
      }

      .photo-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 85%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>

    <div class="content">
      <div class="col-text">
        <div class="badge">
          <span class="badge-dot"></span>
          Disponible — CDI · Mission · Freelance
        </div>

        <div class="subtitle">Développeur Full Stack · Orléans &amp; Remote France</div>

        <h1>
          Je conçois des applications<br />
          <span class="gradient-text">pensées pour durer.</span>
        </h1>

        <div class="tags">
          <span class="tag">React / Next.js</span>
          <span class="tag">TypeScript</span>
          <span class="tag">Node.js</span>
          <span class="tag">Java / Spring Boot</span>
          <span class="tag">Bac+4 CDA · RNCP 37873</span>
        </div>
      </div>

      <div class="col-photo">
        <div class="photo-wrapper">
          <img src="../src/assets/romaric-yi.png" alt="Romaric Yi" />
        </div>
      </div>
    </div>
  </body>
</html>
